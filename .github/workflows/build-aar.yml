name: Build Android Libraries (AARs)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-aars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Clean all library modules
        run: ./gradlew :ftp-engine-core:clean :ftp-hybrid-server:clean 

      - name: Build all library modules (release)
        run: ./gradlew :ftp-engine-core:assembleRelease :ftp-hybrid-server:assembleRelease 

      - name: Collect AAR artifacts
        run: |
          mkdir -p build/artifacts
          for module in ftp-engine-core ftp-hybrid-server; do
            aar_file="$module/build/outputs/aar/$module-release.aar"
            cp "$aar_file" "build/artifacts/$module-release.aar"
            echo "Collected AAR: build/artifacts/$module-release.aar"
          done

      - name: Upload AAR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-library-aars
          path: build/artifacts/
