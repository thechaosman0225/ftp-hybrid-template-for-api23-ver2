plugins {
    id 'com.android.library'
}

android {
    namespace "com.example.ftpengine"
    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

packaging {
        resources {
            excludes += setOf(
                "META-INF/DEPENDENCIES",
                "META-INF/LICENSE",
                "META-INF/LICENSE.txt",
                "META-INF/NOTICE",
                "META-INF/NOTICE.txt",
                "META-INF/ASL2.0"
            )
        }
    }
}

dependencies {
    // Android-compatible MINA transport layer (patched)
    // implementation project(":mina-android-patched")
    implementation 'org.apache.ftpserver:ftpserver-core:1.2.1'
    implementation 'org.apache.mina:mina-core:2.2.5'

    // Optional: Annotations for clean code
    implementation 'androidx.annotation:annotation:1.8.0'
}
